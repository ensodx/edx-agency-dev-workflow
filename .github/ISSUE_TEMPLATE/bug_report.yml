name: Bug Report
description: Report a bug in the project
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Configure app.config.yaml with ...
        2. Start the application
        3. Send request ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (app.config.yaml)
      description: Paste your config. Remove any secrets.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output. Remove any sensitive data before posting.
      render: shell
